# Publishes to npm with provenance when a version tag (v*) is pushed.
#
# Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com: package Settings -> Trusted Publisher ->
# GitHub Actions, org `tokensleft`, repo `tokensleft`, workflow `publish.yml`.
#
# Release flow:
#   npm version <new-version>   (bumps package.json, commits, tags vX.Y.Z)
#   git push --follow-tags
name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22.13.0'
          - os: windows-latest
            node: '22.13.0'
          - os: macos-latest
            node: '22.13.0'
          - os: ubuntu-latest
            node: '24'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing / provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      # OIDC trusted publishing needs npm >= 11.5.1; pin it for reproducibility.
      - run: npm install -g npm@11.6.2
      - run: npm ci
      - run: npm test
      - name: Verify tag matches package version
        run: node -e "const p=require('./package.json'); if (process.env.GITHUB_REF_NAME !== 'v' + p.version) throw new Error('Tag must be v' + p.version)"
      - name: Pack and smoke-test the published artifact
        id: pack
        shell: bash
        run: |
          package=$(npm pack --json | node -e "let s=''; process.stdin.on('data', c => s += c).on('end', () => console.log(JSON.parse(s)[0].filename))")
          echo "file=$package" >> "$GITHUB_OUTPUT"
          npm install --global "./$package"
          tokensleft --help
          tokensleft --demo --once > /dev/null
      - name: Publish stable release
        if: ${{ !contains(github.ref_name, '-') }}
        run: npm publish "./${{ steps.pack.outputs.file }}" --provenance --access public
      - name: Publish prerelease
        if: ${{ contains(github.ref_name, '-') }}
        run: npm publish "./${{ steps.pack.outputs.file }}" --provenance --access public --tag next
